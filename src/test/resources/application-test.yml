server:
  port: 8082

spring:
  application:
    name: monew_batch
    version: 1.0.0

  sql:
    init:
      mode: never

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  jpa:
    hibernate:
      ddl-auto: validate

  datasource-data:
    driver-class-name: org.postgresql.Driver
    jdbc-url: jdbc:postgresql://localhost:5432/monew
    username: postgres
    password: 1234

  datasource-meta:
    driver-class-name: org.postgresql.Driver
    jdbc-url: jdbc:postgresql://localhost:5432/monew_batch_metadata
    username: postgres
    password: 1234

article:
  naver:
    api:
      client-id: test
      client-secret: test
      base-url: https://openapi.naver.com/v1/search/news.json
  hankyung:
    api:
      base-url: https://www.hankyung.com/feed
  chosun:
    api:
      base-url: https://www.chosun.com/arc/outboundfeeds/rss/category
  yonhap:
    api:
      base-url: https://www.yonhapnewstv.co.kr/category/news

storage:
  type: local

aws:
  accessKeyId: test
  secretKey: test
  region: ap-northeast-2
  bucket: test-bucket
